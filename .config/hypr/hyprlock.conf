$wall = ~/r/wallpaper/melancholic-road.jpg
$text_color = rgba(FFFFFFFF)
$entry_background_color = rgba(33333311)
$entry_border_color = rgba(3B3B3B55)
$entry_color = rgba(FFFFFFFF)
$font_family = Rubik Light
$font_family_clock = Rubik Bold
$font_material_symbols = Material Symbols Rounded

general {
    hide_cursor = true
    ignore_empty_input = true
    immediate_render = true
    fractional_scaling = 2
}

background {
    monitor = DP-1
    color = rgba(000000FF)
    path = $wall
    blur_size = 7
    blur_passes = 2
    brightness = 0.7
    vibrancy = 0.25
    vibrancy_darkness = 0.15
}

background {
    monitor = HDMI-A-1
    color = rgba(000000FF)
}

input-field {
    monitor = DP-1
    size = 170, 35
    outline_thickness = 2
    dots_size = 0.25
    dots_spacing = 0.3
    outer_color = $entry_border_color
    inner_color = $entry_background_color
    font_color = $entry_color
    position = 0, -100
    halign = center
    valign = center
}

# Clock --------------------------------------------------------------
label {
    monitor = DP-1
    text = $TIME
    shadow_passes = 1
    shadow_boost = 0.5
    color = $text_color
    font_size = 120
    font_family = $font_family_clock

    position = 0, 60
    halign = center
    valign = center
}

# Greeting -----------------------------------------------------------
label {
    monitor = DP-1
    text = cmd[update:1000] echo -e "$(date +"%A, %b %d %Y")"
    shadow_passes = 1
    shadow_boost = 0.5
    color = $text_color
    font_size = 24
    font_family = $font_family

    position = 0, 160
    halign = center
    valign = center
}

# Battery status -----------------------------------------------------
label {
    monitor = DP-1
    text = I shall be nothing, the wind, the sky.
    shadow_passes = 1
    shadow_boost = 0.5
    color = $text_color
    font_size = 14
    font_family = $font_family

    position = 0, 20
    halign = center
    valign = bottom
}


